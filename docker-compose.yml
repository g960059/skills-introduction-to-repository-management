services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MONGODB_URI: "mongodb://mongo:27017/"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      - mongo
    command: ["uvicorn", "src.app:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  mongo_data:
